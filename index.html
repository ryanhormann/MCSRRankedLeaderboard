<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCSR Ranked Elo Leaderboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="getEloLeaderboard()">
    <h1>MCSR Ranked Leaderboard</h1>

    <nav>
        <button onclick="getEloLeaderboard()">Elo</button>
        <button onclick="getRunsLeaderboard()">Runs</button>
    </nav>

    <div id="searchbar-container">
        <input type="text" placeholder="Username">
        <button onclick="getUsernameStats()">Search</button>
    </div>

    <h2>Elo Leaderboard</h2>

    <div id="table-container">
        <table>
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Username</th>
                    <th>Elo</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
